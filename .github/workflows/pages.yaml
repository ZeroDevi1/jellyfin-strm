name: '📄 Deploy Manifest to Pages'

on:
  push:
    branches:
      - jellyfin-plugin
      - main
    paths:
      - 'manifest.json'
      - 'pages/**'
  workflow_run:
    workflows: ['🚀 Publish Plugin']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Ensure manifest in pages
        run: |
          mkdir -p pages
          cp manifest.json pages/manifest.json
          touch pages/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'pages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
