name: '🏗️ Build Plugin'

on:
  push:
    branches:
      - jellyfin-plugin
      - main
    paths-ignore:
      - '**/*.md'
      - 'src/**'
      - 'tests/**'
      - 'config.example.yaml'
      - 'docker-compose.nas.example.yml'
      - 'Dockerfile'
  pull_request:
    branches:
      - jellyfin-plugin
      - main
    paths-ignore:
      - '**/*.md'
      - 'src/**'
      - 'tests/**'
      - 'config.example.yaml'
      - 'docker-compose.nas.example.yml'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Jellyfin Plugin
        uses: oddstr13/jellyfin-plugin-repository-manager@v1.1.1
        id: jprm
        with:
          dotnet-target: 'net9.0'

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-plugin-strmsync
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.jprm.outputs.artifact }}
